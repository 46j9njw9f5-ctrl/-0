<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>-0（ゼロ）</title>
    <!--
      GitHub Pages は SPA のディープリンク（/company/... など）に 404 を返すため、
      パスをクエリに退避して index.html へリダイレクトし、アプリ側で復元する。
      （single-page-apps-for-github-pages 方式。ユーザーページのため keep=0）
    -->
    <script>
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
